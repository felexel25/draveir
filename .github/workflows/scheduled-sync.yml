name: Sincronización programada

# Refresca el KV y dispara un rebuild de Cloudflare Pages cada pocas horas,
# para que los cambios en Notion aparezcan solos y los capítulos ya desbloqueados
# se promuevan a estático (mejor SEO/rendimiento). El desbloqueo por fecha en sí
# es instantáneo vía la Function; esto solo mantiene el sitio fresco.
on:
  schedule:
    - cron: '0 */6 * * *' # cada 6 horas (UTC)
  workflow_dispatch: {} # botón manual "Run workflow"

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
      CLOUDFLARE_DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      - name: Actualizar KV con capítulos bloqueados
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run kv:put
      - name: Disparar rebuild de Cloudflare Pages
        if: env.CLOUDFLARE_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$CLOUDFLARE_DEPLOY_HOOK_URL"
