name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npm run check
      - run: npm run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      # Sube el texto de capítulos bloqueados a KV. Solo corre cuando el token
      # de Cloudflare está configurado (antes del setup, se omite sin fallar).
      - name: Subir capítulos bloqueados a KV
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run kv:put
      - run: npm run build
